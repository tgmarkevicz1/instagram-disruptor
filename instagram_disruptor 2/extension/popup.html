<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instagram Disruptor</title>
  <style>
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #fafafa;
      color: #262626;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px;
      color: #e1306c;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -1px;
      margin: 8px 0 4px;
    }
    .label {
      font-size: 11px;
      color: #8e8e8e;
      text-align: center;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 7px;
      border: 1px solid #dbdbdb;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #e1306c;
    }
    button:hover { background: #f0f0f0; }
    .status {
      font-size: 11px;
      margin-top: 10px;
      color: #8e8e8e;
      text-align: center;
    }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
    .dot.green { background: #3897f0; }
    .dot.red   { background: #ed4956; }
  </style>
</head>
<body>
  <h2>📸 Instagram Disruptor</h2>
  <div class="stat" id="time">0:00</div>
  <div class="label">total time on Instagram today</div>

  <button id="resetBtn">Reset timer</button>

  <div class="status" id="helperStatus">
    <span class="dot" id="dot"></span><span id="helperText">Checking helper…</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
